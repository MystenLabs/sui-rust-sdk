syntax = "proto3";

package sui.rpc.v2alpha;

import "google/protobuf/field_mask.proto";
import "sui/rpc/v2/checkpoint.proto";
import "sui/rpc/v2/event.proto";
import "sui/rpc/v2/executed_transaction.proto";
import "sui/rpc/v2alpha/filter.proto";
import "sui/rpc/v2alpha/pagination.proto";

// LedgerService provides paginated, filtered access to checkpoints, transactions, and events.
service LedgerService {
  // List checkpoints matching the provided filters, with pagination.
  //
  // Checkpoints are returned in ascending or descending checkpoint sequence
  // number order according to the pagination ordering.
  // A checkpoint matches if any transaction it contains satisfies the filter.
  rpc ListCheckpoints(ListCheckpointsRequest) returns (stream ListCheckpointsResponse);

  // List transactions matching the provided filters, with pagination.
  //
  // Transactions are returned in ascending or descending transaction sequence
  // order according to the pagination ordering.
  rpc ListTransactions(ListTransactionsRequest) returns (stream ListTransactionsResponse);

  // List events matching the provided filters, with pagination.
  //
  // Events are returned in ascending or descending packed event sequence order
  // according to the pagination ordering.
  rpc ListEvents(ListEventsRequest) returns (stream ListEventsResponse);
}

// Request message for LedgerService.ListCheckpoints.
message ListCheckpointsRequest {
  // Optional. Mask for specifying which parts of the Checkpoint should be
  // returned (e.g. summary, contents, signatures).
  optional google.protobuf.FieldMask read_mask = 1;

  // Required. Start of the checkpoint range to query (inclusive).
  optional uint64 start_checkpoint = 2;

  // Required. End of the checkpoint range to query (exclusive). The range
  // width must not exceed 3,000,000 checkpoints.
  optional uint64 end_checkpoint = 3;

  // Optional. DNF filter over indexed transaction dimensions. A checkpoint
  // matches if any transaction it contains satisfies the filter. If absent,
  // all checkpoints in the range are returned.
  optional TransactionFilter filter = 4;

  // Optional cursor-bounded pagination. If unspecified, reads in ascending order
  // with the default page size. The maximum page size is 100; values above
  // 100 will be coerced to 100.
  optional Pagination pagination = 5;
}

// One checkpoint item.
message CheckpointItem {
  // Opaque cursor for this item. It may be sent as `pagination.cursor` with
  // the same request parameters to resume after this item in the current scan
  // direction.
  optional bytes cursor = 1;

  // One matching checkpoint.
  optional sui.rpc.v2.Checkpoint checkpoint = 2;
}

// Response message for LedgerService.ListCheckpoints.
message ListCheckpointsResponse {
  oneof response {
    // One matching checkpoint.
    CheckpointItem item = 1;

    // Final pagination metadata.
    PageInfo page_info = 2;
  }
}

// Request message for LedgerService.ListTransactions.
message ListTransactionsRequest {
  // Optional. Mask for specifying which parts of the ExecutedTransaction
  // should be returned.
  optional google.protobuf.FieldMask read_mask = 1;

  // Required. Start of the checkpoint range to query (inclusive).
  optional uint64 start_checkpoint = 2;

  // Required. End of the checkpoint range to query (exclusive). The range
  // width must not exceed 3,000,000 checkpoints.
  optional uint64 end_checkpoint = 3;

  // Optional. DNF filter over indexed dimensions.
  // If absent, all transactions in the range are returned.
  optional TransactionFilter filter = 4;

  // Optional cursor-bounded pagination. If unspecified, reads in ascending order
  // with the default page size. The maximum page size is 500; values above
  // 500 will be coerced to 500.
  optional Pagination pagination = 5;
}

// One transaction item.
message TransactionItem {
  // Opaque cursor for this item. It may be sent as `pagination.cursor` with
  // the same request parameters to resume after this item in the current scan
  // direction.
  optional bytes cursor = 1;

  // One matching transaction.
  optional sui.rpc.v2.ExecutedTransaction transaction = 2;
}

// Response message for LedgerService.ListTransactions.
message ListTransactionsResponse {
  oneof response {
    // One matching transaction.
    TransactionItem item = 1;

    // Final pagination metadata.
    PageInfo page_info = 2;
  }
}

// Request message for LedgerService.ListEvents.
message ListEventsRequest {
  // Optional. Mask for specifying which parts of the Event should be returned.
  optional google.protobuf.FieldMask read_mask = 1;

  // Required. Start of the checkpoint range to query (inclusive).
  optional uint64 start_checkpoint = 2;

  // Required. End of the checkpoint range to query (exclusive). The range
  // width must not exceed 3,000,000 checkpoints.
  optional uint64 end_checkpoint = 3;

  // Optional. DNF filter over indexed dimensions.
  // If absent, all events in the range are returned.
  optional EventFilter filter = 4;

  // Optional cursor-bounded pagination. If unspecified, reads in ascending order
  // with the default page size. The maximum page size is 1000; values above
  // 1000 will be coerced to 1000.
  optional Pagination pagination = 5;
}

// One event item.
message EventItem {
  // Opaque cursor for this item. It may be sent as `pagination.cursor` with
  // the same request parameters to resume after this item in the current scan
  // direction.
  optional bytes cursor = 1;

  // The checkpoint containing the transaction that emitted this event.
  optional uint64 checkpoint = 2;

  // The index of this event within the transaction's event list (0-based).
  optional uint32 event_index = 3;

  // The digest of the transaction that emitted this event.
  optional string transaction_digest = 4;

  // The event data.
  optional sui.rpc.v2.Event event = 5;
}

// Response message for LedgerService.ListEvents.
message ListEventsResponse {
  oneof response {
    // One matching event.
    EventItem item = 1;

    // Final pagination metadata.
    PageInfo page_info = 2;
  }
}
